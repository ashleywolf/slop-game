<script>
// ==================== CONSTANTS ====================
const CW=800,CH=560,COLS=20,ROWS=14,CS=40;
const BASE_SPEED=1.5;
const WAVE_DELAY=12;
const MAX_WAVE=15;

// Path waypoints (pixel coords)
const WAYPOINTS=[
{x:20,y:100},{x:700,y:100},{x:700,y:260},{x:100,y:260},{x:100,y:420},{x:780,y:420}
];

// Path cells
const pathCells=new Set();
function initPathCells(){
const segs=[[0,2,17,2],[17,3,17,5],[17,6,2,6],[2,7,2,9],[2,10,19,10]];
for(const[x1,y1,x2,y2]of segs){
const sx=Math.min(x1,x2),ex=Math.max(x1,x2),sy=Math.min(y1,y2),ey=Math.max(y1,y2);
for(let x=sx;x<=ex;x++)for(let y=sy;y<=ey;y++)pathCells.add(x+','+y);
}}
initPathCells();

function isPathCell(gx,gy){return pathCells.has(gx+','+gy)}
function isValidPlacement(gx,gy){
if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return false;
if(isPathCell(gx,gy))return false;
const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
for(const[dx,dy]of dirs)if(isPathCell(gx+dx,gy+dy))return true;
return false;
}

// ==================== TOWER DEFINITIONS ====================
const TOWER_DEFS={
dog:{name:'Dog',emoji:'\u{1F415}',cost:20,range:80,rate:1.2,dmg:8,desc:'Barks at slop. Good boy.',
  projType:'woof',projText:'WOOF',friendlyFire:0,aoe:0,
  upgrade:{cost:40,name:'Big Dog',dmg:15,range:100,desc:'Louder bark. More bite.'}},
nerd:{name:'Well Actually Guy',emoji:'\u{1F913}',cost:45,range:100,rate:0.6,dmg:20,desc:'Pedantic. Effective.',
  projType:'text',projText:'well actually...',friendlyFire:0.05,aoe:0,
  upgrade:{cost:70,name:'Professor',dmg:35,range:120,desc:'Citation needed.'}},
duck:{name:'Rubber Duck',emoji:'\u{1F986}',cost:35,range:90,rate:0.8,dmg:12,desc:'Reveals hidden slop.',
  projType:'duck',projText:'\u{1F986}',friendlyFire:0,aoe:0,bounces:2,
  upgrade:{cost:55,name:'Golden Duck',dmg:18,bounces:3,desc:'Extra bouncy.'}},
trebuchet:{name:'Trebuchet',emoji:'\u{1F3F0}',cost:75,range:160,rate:0.3,dmg:45,desc:'Area damage. Watch for friendly fire!',
  projType:'boulder',projText:'\u25CF',friendlyFire:1,aoe:30,
  upgrade:{cost:100,name:'Superior Siege Engine',dmg:70,desc:'Flaming boulders.'}},
coffee:{name:'Coffee Machine',emoji:'\u2615',cost:50,range:100,rate:0,dmg:0,desc:'Boosts nearby tower speed 50%.',
  projType:null,friendlyFire:0,aoe:0,isSupport:true,
  upgrade:{cost:80,name:'Espresso Machine',range:130,boostMult:0.75,desc:'Even faster. Even stronger.'}},
troll:{name:'Troll',emoji:'\u{1F4A9}',cost:90,range:130,rate:1.0,dmg:25,desc:'Chaos. Pure chaos.',
  projType:'emoji',friendlyFire:0.15,aoe:0,
  upgrade:{cost:130,name:'Influencer',dmg:40,desc:'Hot takes every 15s. Explosions.'}}
};

const TOWER_ORDER=['dog','nerd','duck','trebuchet','coffee','troll'];
const CHAOS_EMOJI=['\u{1F480}','\u{1F525}','\u{1F440}','\u{1F624}','\u{1F5FF}'];

// ==================== ENEMY DEFINITIONS ====================
const BUZZWORDS=['synergy','leverage','robust','paradigm','utilize','streamline','harness','disruptive','scalable','ideation','holistic','agile'];
const CORP_PHRASES=['move-the-needle','circle-back','low-hanging-fruit','best-in-class','game-changing','deep-dive','value-add','thought-leader'];
const THOUGHT_WORDS=['arguably','remarkably','notably','fundamentally','interestingly'];
const STEALTH_WORDS=['innovative','strategic','comprehensive','optimized','dynamic'];
const BOMB_WORDS=["it's-worth-noting",'at-the-end-of-the-day','moving-forward'];
const BOSS_WORDS=['THOUGHT PIECE','LISTICLE','HOT TAKE','MANIFESTO','WHITEPAPER'];
const GOOD_WORDS=['bug','fix','deploy','test','merge','ship','build','debug','patch','commit','refactor','lint','push','pull','rebase','grep'];

function rnd(arr){return arr[Math.floor(Math.random()*arr.length)]}

// ==================== WAVE DEFINITIONS ====================
const WAVES=[
null, // index 0 unused
{enemies:[{t:'buzz',n:6},{t:'good',n:2}],interval:1500},
{enemies:[{t:'buzz',n:10},{t:'good',n:3}],interval:1200},
{enemies:[{t:'buzz',n:6},{t:'corp',n:4},{t:'good',n:3}],interval:1200},
{enemies:[{t:'thought',n:10},{t:'buzz',n:4},{t:'good',n:3}],interval:400},
{enemies:[{t:'boss',n:1},{t:'buzz',n:8},{t:'good',n:3}],interval:1200},
{enemies:[{t:'buzz',n:8},{t:'corp',n:4},{t:'stealth',n:2},{t:'good',n:4}],interval:1100},
{enemies:[{t:'thought',n:6},{t:'corp',n:5},{t:'bomb',n:2},{t:'good',n:4}],interval:1000},
{enemies:[{t:'buzz',n:14},{t:'bomb',n:3},{t:'good',n:5}],interval:900},
{enemies:[{t:'stealth',n:6},{t:'corp',n:6},{t:'good',n:4}],interval:1000},
{enemies:[{t:'boss',n:2},{t:'buzz',n:10},{t:'good',n:5}],interval:1100},
{enemies:[{t:'buzz',n:18},{t:'bomb',n:4},{t:'good',n:6}],interval:600},
{enemies:[{t:'stealth',n:8},{t:'thought',n:8},{t:'good',n:5}],interval:700},
{enemies:[{t:'corp',n:8},{t:'bomb',n:4},{t:'thought',n:6},{t:'good',n:5}],interval:800},
{enemies:[{t:'buzz',n:8},{t:'corp',n:5},{t:'thought',n:5},{t:'stealth',n:4},{t:'bomb',n:3},{t:'good',n:6}],interval:700},
{enemies:[{t:'boss',n:3},{t:'buzz',n:15},{t:'stealth',n:6},{t:'good',n:8}],interval:600},
];

// ==================== SOUND SYSTEM ====================
let audioCtx=null,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(type){
if(!soundOn||!audioCtx)return;
try{
const now=audioCtx.currentTime;
const g=audioCtx.createGain();g.connect(audioCtx.destination);
switch(type){
case'shoot':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=800+Math.random()*400;
o.connect(g);g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.05);
o.start(now);o.stop(now+.05);break}
case'bark':{const n=audioCtx.createBufferSource();const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.08,audioCtx.sampleRate);
const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*3);
n.buffer=buf;n.connect(g);g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.08);
n.start(now);break}
case'pop':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(600,now);
o.frequency.exponentialRampToValueAtTime(200,now+.1);o.connect(g);
g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);
o.start(now);o.stop(now+.1);break}
case'bossdeath':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=60;o.connect(g);
g.gain.setValueAtTime(.3,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);
o.start(now);o.stop(now+.3);
const n=audioCtx.createBufferSource();const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.3,audioCtx.sampleRate);
const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*4);
n.buffer=buf;const g2=audioCtx.createGain();g2.connect(audioCtx.destination);
g2.gain.setValueAtTime(.15,now);g2.gain.exponentialRampToValueAtTime(.001,now+.3);
n.connect(g2);n.start(now);break}
case'goodword':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(660,now);
o.frequency.setValueAtTime(880,now+.05);o.connect(g);
g.gain.setValueAtTime(.12,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);
o.start(now);o.stop(now+.1);break}
case'slophit':{const o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.value=100;o.connect(g);
g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);
o.start(now);o.stop(now+.2);break}
case'place':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(200,now);
o.frequency.exponentialRampToValueAtTime(100,now+.08);o.connect(g);
g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.08);
o.start(now);o.stop(now+.08);break}
case'wavestart':{const o=audioCtx.createOscillator();o.type='square';o.frequency.value=300;o.connect(g);
g.gain.setValueAtTime(.12,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);
o.start(now);o.stop(now+.2);break}
case'waveclear':{[523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator();o.type='sine';
o.frequency.value=f;const gi=audioCtx.createGain();gi.connect(audioCtx.destination);
gi.gain.setValueAtTime(.1,now+i*.1);gi.gain.exponentialRampToValueAtTime(.001,now+i*.1+.15);
o.connect(gi);o.start(now+i*.1);o.stop(now+i*.1+.15)});break}
case'bossspawn':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=80;o.connect(g);
g.gain.setValueAtTime(.2,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);
o.start(now);o.stop(now+.25);break}
case'upgrade':{[440,554,659].forEach((f,i)=>{const o=audioCtx.createOscillator();o.type='sine';
o.frequency.value=f;const gi=audioCtx.createGain();gi.connect(audioCtx.destination);
gi.gain.setValueAtTime(.1,now+i*.07);gi.gain.exponentialRampToValueAtTime(.001,now+i*.07+.12);
o.connect(gi);o.start(now+i*.07);o.stop(now+i*.07+.12)});break}
case'bomb':{const n=audioCtx.createBufferSource();const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.3,audioCtx.sampleRate);
const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5)*(1+Math.sin(i*.01)*0.5);
n.buffer=buf;n.connect(g);g.gain.setValueAtTime(.25,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);
n.start(now);break}
case'moo':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(200,now);
const lfo=audioCtx.createOscillator();lfo.frequency.value=6;const lfoG=audioCtx.createGain();lfoG.gain.value=30;
lfo.connect(lfoG);lfoG.connect(o.frequency);lfo.start(now);lfo.stop(now+.4);
o.connect(g);g.gain.setValueAtTime(.15,now);g.gain.setValueAtTime(.15,now+.2);
g.gain.exponentialRampToValueAtTime(.001,now+.4);o.start(now);o.stop(now+.4);break}
case'hottake':{[200,252,300].forEach(f=>{const o=audioCtx.createOscillator();o.type='square';
o.frequency.value=f;const gi=audioCtx.createGain();gi.connect(audioCtx.destination);
gi.gain.setValueAtTime(.07,now);gi.gain.exponentialRampToValueAtTime(.001,now+.3);
o.connect(gi);o.start(now);o.stop(now+.3)});break}
case'sell':{const o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(500,now);
o.frequency.exponentialRampToValueAtTime(300,now+.1);o.connect(g);
g.gain.setValueAtTime(.12,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);
o.start(now);o.stop(now+.1);break}
}}catch(e){}}

// ==================== GAME STATE ====================
const G={
state:'menu',wave:0,gold:100,score:0,castleHP:100,
towers:[],enemies:[],projectiles:[],particles:[],floatTexts:[],coffeePickups:[],
selectedType:null,selectedTower:null,
waveTimer:0,waveActive:false,spawnQueue:[],spawnTimer:0,
betweenWaves:false,countdown:0,
endless:false,endlessWave:0,
mouseX:0,mouseY:0,mouseGX:-1,mouseGY:-1,
castleSlopWords:[],
stats:{killed:0,goodSaved:0,goodLost:0,goldEarned:0,towerKills:{}},
lastTime:0,
highScores:JSON.parse(localStorage.getItem('slopDefenseHS')||'{"campaign":0,"endless":0}')
};

// ==================== CANVAS SETUP ====================
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=CW;canvas.height=CH;

// ==================== HELPERS ====================
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function lerp(a,b,t){return a+(b-a)*t}
function cellCenter(gx,gy){return{x:gx*CS+CS/2,y:gy*CS+CS/2}}
function toGrid(px,py){return{gx:Math.floor(px/CS),gy:Math.floor(py/CS)}}

function getPathProgress(enemy){
let total=0;
for(let i=0;i<WAYPOINTS.length-1;i++){
const segLen=dist(WAYPOINTS[i],WAYPOINTS[i+1]);
if(i<enemy.wpIndex)total+=segLen;
else if(i===enemy.wpIndex)total+=segLen*enemy.wpT;
}
return total;
}

function posOnPath(wpIndex,t){
if(wpIndex>=WAYPOINTS.length-1)return{x:WAYPOINTS[WAYPOINTS.length-1].x,y:WAYPOINTS[WAYPOINTS.length-1].y};
const a=WAYPOINTS[wpIndex],b=WAYPOINTS[wpIndex+1];
return{x:lerp(a.x,b.x,t),y:lerp(a.y,b.y,t)};
}

// ==================== SPAWN HELPERS ====================
function makeEnemy(type,extraHP){
const hp=extraHP||1;
let e={alive:true,wpIndex:0,wpT:0,x:WAYPOINTS[0].x,y:WAYPOINTS[0].y,
  slowed:false,slowTimer:0,revealed:false,revealTimer:0,isGood:false,isBoss:false,
  spawned:false,desperation:false,color:'#f0883e',radius:12,isStealth:false,isBomb:false};
switch(type){
case'buzz':Object.assign(e,{type:'buzz',word:rnd(BUZZWORDS),hp:25*hp,maxHP:25*hp,speed:1,value:8,color:'#f0883e',radius:12});break;
case'corp':Object.assign(e,{type:'corp',word:rnd(CORP_PHRASES),hp:55*hp,maxHP:55*hp,speed:.7,value:15,color:'#c45a1a',radius:16});break;
case'thought':Object.assign(e,{type:'thought',word:rnd(THOUGHT_WORDS),hp:12*hp,maxHP:12*hp,speed:2.2,value:4,color:'#e3b341',radius:9});break;
case'stealth':Object.assign(e,{type:'stealth',word:rnd(STEALTH_WORDS),hp:35*hp,maxHP:35*hp,speed:1.1,value:20,color:'#58a6ff',radius:13,isStealth:true,revealTimer:120});break;
case'bomb':Object.assign(e,{type:'bomb',word:rnd(BOMB_WORDS),hp:45*hp,maxHP:45*hp,speed:.8,value:12,color:'#f85149',radius:14,isBomb:true});break;
case'boss':Object.assign(e,{type:'boss',word:rnd(BOSS_WORDS),hp:180*hp,maxHP:180*hp,speed:.35,value:40,color:'#6e1010',radius:22,isBoss:true});break;
case'good':Object.assign(e,{type:'good',word:rnd(GOOD_WORDS),hp:999,maxHP:999,speed:1,value:0,color:'#56d4dd',radius:11,isGood:true});break;
}
return e;
}

function buildSpawnQueue(waveDef,hpMult){
const q=[];
for(const g of waveDef.enemies){
for(let i=0;i<g.n;i++)q.push(g.t);
}
// shuffle but keep good words roughly mixed in
for(let i=q.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[q[i],q[j]]=[q[j],q[i]]}
return q.map(t=>makeEnemy(t,hpMult));
}

// ==================== TOWER CREATION ====================
function placeTower(type,gx,gy){
const def=TOWER_DEFS[type];
const pos=cellCenter(gx,gy);
const t={type,gx,gy,x:pos.x,y:pos.y,level:1,cooldown:0,kills:0,
  disabled:false,disableTimer:0,
  range:def.range,rate:def.rate,dmg:def.dmg,
  friendlyFire:def.friendlyFire,aoe:def.aoe,
  hotTakeTimer:type==='troll'?1800:0,
  coffeeTimer:type==='coffee'?1200:0,
  totalCost:def.cost,
  bounces:def.bounces||0
};
return t;
}

// ==================== PROJECTILE CREATION ====================
function fireProjectile(tower,target){
const def=TOWER_DEFS[tower.type];
let p={x:tower.x,y:tower.y,target,speed:5,dmg:tower.dmg,alive:true,
  type:def.projType,text:def.projText,aoe:tower.aoe,friendlyFire:def.friendlyFire>=1,
  bounces:tower.bounces||0,bouncesLeft:tower.bounces||0,
  towerType:tower.type,isUpgraded:tower.level>1,
  arcProgress:0,startX:tower.x,startY:tower.y,
  targetX:target.x,targetY:target.y,
  isCow:false,angle:0};
// Trebuchet arc
if(tower.type==='trebuchet'){
  p.speed=3;p.targetX=target.x;p.targetY=target.y;
  if(Math.random()<0.15){p.isCow=true;p.dmg*=2;p.text='\u{1F404}';playSound('moo')}
}
// Troll random direction
if(tower.type==='troll'){
  p.text=rnd(CHAOS_EMOJI);
  if(Math.random()<0.2){
    const angle=Math.random()*Math.PI*2;
    p.target=null;p.vx=Math.cos(angle)*5;p.vy=Math.sin(angle)*5;
  }
}
// Friendly fire check for nerd
if(tower.type==='nerd'&&Math.random()<tower.friendlyFire){
  const goods=G.enemies.filter(e=>e.alive&&e.isGood&&dist(tower,e)<tower.range);
  if(goods.length)p.target=goods[Math.floor(Math.random()*goods.length)];
}
// Troll friendly fire
if(tower.type==='troll'&&p.target&&Math.random()<tower.friendlyFire){
  const goods=G.enemies.filter(e=>e.alive&&e.isGood&&dist(tower,e)<tower.range);
  if(goods.length)p.target=goods[Math.floor(Math.random()*goods.length)];
}
// Nerd double damage to corp
if(tower.type==='nerd'&&target.type==='corp')p.dmg*=2;
return p;
}

// ==================== PARTICLES ====================
function spawnParticles(x,y,color,count){
for(let i=0;i<count;i++){
const angle=Math.random()*Math.PI*2,spd=1+Math.random()*3;
G.particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
  life:30+Math.random()*20,maxLife:50,color,radius:2+Math.random()*2});
}}

function spawnFloatText(x,y,text,color){
G.floatTexts.push({x,y,text,color,life:60,maxLife:60});
}

// ==================== GAME LOGIC ====================
function updateEnemies(dt){
for(const e of G.enemies){
if(!e.alive)continue;
// Stealth reveal timer
if(e.isStealth&&!e.revealed){
  e.revealTimer-=dt;
  if(e.revealTimer<=0){e.revealed=true;e.color='#f0883e'}
  // Check rubber duck proximity
  for(const t of G.towers){
    if(t.type==='duck'&&!t.disabled&&dist(t,e)<t.range){e.revealed=true;e.color='#f0883e';break}
  }
}
// Slow
if(e.slowed){e.slowTimer-=dt;if(e.slowTimer<=0)e.slowed=false}
// Movement
const spd=BASE_SPEED*e.speed*(e.slowed?.5:1)*(e.desperation?1.5:1)*dt/16.67;
if(e.wpIndex>=WAYPOINTS.length-1){
  // Reached castle
  if(e.isGood){
    G.castleHP=Math.min(100,G.castleHP+2);
    G.gold+=5;G.stats.goodSaved++;G.stats.goldEarned+=5;
    spawnFloatText(e.x,e.y-10,'+5 +2%','#56d4dd');
    playSound('goodword');
  }else{
    G.castleHP-=3;
    G.castleSlopWords.push({word:e.word,x:Math.random()*60-30,y:Math.random()*40-20,rot:Math.random()*.6-.3});
    spawnFloatText(e.x,e.y-10,'-3%','#f85149');
    playSound('slophit');
  }
  e.alive=false;continue;
}
const wp=WAYPOINTS[e.wpIndex+1];
const segDist=dist(WAYPOINTS[e.wpIndex],wp);
e.wpT+=spd/segDist;
if(e.wpT>=1){e.wpT=0;e.wpIndex++;if(e.wpIndex>=WAYPOINTS.length-1){e.wpT=1}}
const pos=posOnPath(e.wpIndex,e.wpT);
e.x=pos.x;e.y=pos.y;
// Boss desperation
if(e.isBoss&&!e.desperation&&e.hp<=e.maxHP*0.25){
  e.desperation=true;
  for(let i=0;i<2;i++){const m=makeEnemy('buzz',G.endless?1+G.endlessWave*0.15:1);m.wpIndex=e.wpIndex;m.wpT=e.wpT;m.x=e.x;m.y=e.y;G.enemies.push(m)}
}
if(e.isBoss&&!e.spawned&&e.hp<=e.maxHP*0.5){
  e.spawned=true;
  for(let i=0;i<3;i++){const m=makeEnemy('buzz',G.endless?1+G.endlessWave*0.15:1);m.wpIndex=e.wpIndex;m.wpT=e.wpT;m.x=e.x;m.y=e.y;G.enemies.push(m)}
}
// Bomb pulse
if(e.isBomb)e.pulsePhase=(e.pulsePhase||0)+dt*0.15;
}}

function updateTowers(dt){
for(const t of G.towers){
if(t.disabled){t.disableTimer-=dt;if(t.disableTimer<=0)t.disabled=false;continue}
// Coffee machine boost calc
let boostMult=1;
for(const c of G.towers){
  if(c.type==='coffee'&&!c.disabled&&c!==t&&dist(c,t)<c.range)
    boostMult+=c.level>1?0.75:0.5;
}
// Coffee machine special
if(t.type==='coffee'){
  t.coffeeTimer-=dt*boostMult;
  if(t.coffeeTimer<=0){
    t.coffeeTimer=(t.level>1?720:1200);
    // Spawn coffee on random path point
    const wp=Math.floor(Math.random()*(WAYPOINTS.length-1));
    const tt=Math.random();
    const pos=posOnPath(wp,tt);
    G.coffeePickups.push({x:pos.x,y:pos.y,life:600,radius:8});
  }
  continue;
}
// Troll hot take
if(t.type==='troll'){
  t.hotTakeTimer-=dt;
  const interval=t.level>1?900:1800;
  if(t.hotTakeTimer<=0){
    t.hotTakeTimer=interval;
    playSound('hottake');
    for(const e of G.enemies){
      if(e.alive&&!e.isGood){e.hp-=10;if(e.hp<=0)killEnemy(e,t)}
    }
    spawnFloatText(t.x,t.y-20,'HOT TAKE!','#f0883e');
    // Screen flash effect
    G.hotTakeFlash=10;
  }
}
// Targeting
if(t.rate===0)continue;
t.cooldown-=dt*boostMult;
if(t.cooldown>0)continue;
// Find target
let target=null,bestProg=-1;
for(const e of G.enemies){
  if(!e.alive)continue;
  if(e.isGood)continue;
  if(e.isStealth&&!e.revealed)continue;
  if(dist(t,e)>t.range)continue;
  const prog=getPathProgress(e);
  if(prog>bestProg){bestProg=prog;target=e}
}
if(!target)continue;
t.cooldown=1000/t.rate;
const p=fireProjectile(t,target);
G.projectiles.push(p);
if(t.type==='dog')playSound('bark');
else playSound('shoot');
}}

function updateProjectiles(dt){
for(const p of G.projectiles){
if(!p.alive)continue;
// Trebuchet arc
if(p.towerType==='trebuchet'){
  p.arcProgress+=dt*0.02;
  if(p.arcProgress>=1){
    p.alive=false;
    // AOE damage
    const aoeR=p.isUpgraded?40:30;
    for(const e of G.enemies){
      if(!e.alive)continue;
      if(dist({x:p.targetX,y:p.targetY},e)<=aoeR){
        if(e.isGood&&p.friendlyFire){
          e.hp-=p.dmg;if(e.hp<=0)killGoodWord(e);
        }else if(!e.isGood){
          e.hp-=p.dmg;if(e.hp<=0)killEnemy(e,null);
        }
      }
    }
    spawnParticles(p.targetX,p.targetY,p.isCow?'#8B4513':'#888',12);
    playSound(p.isCow?'moo':'bomb');
  }else{
    const t2=p.arcProgress;
    p.x=lerp(p.startX,p.targetX,t2);
    p.y=lerp(p.startY,p.targetY,t2)-Math.sin(t2*Math.PI)*80;
  }
  continue;
}
// Homing or straight
if(p.target&&p.target.alive){
  const dx=p.target.x-p.x,dy=p.target.y-p.y;
  const d=Math.hypot(dx,dy);
  if(d<8){
    // Hit
    p.target.hp-=p.dmg;
    if(p.target.hp<=0){
      if(p.target.isGood)killGoodWord(p.target);
      else killEnemy(p.target,null);
    }
    // Bounce (duck)
    if(p.bouncesLeft>0&&!p.target.isGood){
      p.bouncesLeft--;
      let nearest=null,nd=Infinity;
      for(const e of G.enemies){
        if(!e.alive||e===p.target||e.isGood)continue;
        if(e.isStealth&&!e.revealed)continue;
        const dd=dist(p,e);if(dd<nd&&dd<120){nd=dd;nearest=e}
      }
      if(nearest){p.target=nearest}else{p.alive=false}
    }else{
      p.alive=false;
      // Troll upgraded explosion
      if(p.towerType==='troll'&&p.isUpgraded){
        for(const e of G.enemies){
          if(!e.alive||e.isGood)continue;
          if(dist(p,e)<30){e.hp-=10;if(e.hp<=0)killEnemy(e,null)}
        }
        spawnParticles(p.x,p.y,'#f0883e',6);
      }
    }
    spawnParticles(p.x,p.y,'#fff',3);
  }else{
    p.x+=dx/d*p.speed*dt/16.67*1.5;
    p.y+=dy/d*p.speed*dt/16.67*1.5;
  }
}else if(p.vx!==undefined){
  // Straight line (random troll)
  p.x+=p.vx*dt/16.67;p.y+=p.vy*dt/16.67;
  // Check hits
  for(const e of G.enemies){
    if(!e.alive)continue;
    if(dist(p,e)<12){
      if(e.isGood){e.hp-=p.dmg;if(e.hp<=0)killGoodWord(e)}
      else{e.hp-=p.dmg;if(e.hp<=0)killEnemy(e,null)}
      p.alive=false;spawnParticles(p.x,p.y,'#fff',3);break;
    }
  }
  if(p.x<-20||p.x>CW+20||p.y<-20||p.y>CH+20)p.alive=false;
}else{
  p.alive=false;
}
}}

function killEnemy(e,tower){
if(!e.alive)return;
e.alive=false;G.gold+=e.value;G.score+=e.value*10;G.stats.killed++;G.stats.goldEarned+=e.value;
if(tower){tower.kills++;G.stats.towerKills[tower.type]=(G.stats.towerKills[tower.type]||0)+1}
spawnParticles(e.x,e.y,e.color,8);
spawnFloatText(e.x,e.y-15,'+'+e.value,'#f0883e');
if(e.isBoss)playSound('bossdeath');else playSound('pop');
// Dog fetch bonus
if(tower&&tower.type==='dog'&&Math.random()<0.15){
  G.gold+=5;G.stats.goldEarned+=5;
  spawnFloatText(e.x,e.y-30,'FETCH! +5','#e3b341');
}
// Slop bomb explosion
if(e.isBomb){
  playSound('bomb');
  spawnParticles(e.x,e.y,'#f85149',15);
  for(const t of G.towers){
    if(dist(t,e)<60){t.disabled=true;t.disableTimer=180}
  }
  spawnFloatText(e.x,e.y-25,'BOOM!','#f85149');
}
}

function killGoodWord(e){
if(!e.alive||!e.isGood)return;
e.alive=false;G.gold-=10;G.castleHP-=3;G.stats.goodLost++;
spawnParticles(e.x,e.y,'#56d4dd',8);
spawnFloatText(e.x,e.y-15,'FRIENDLY FIRE! -10','\u{1F534}');
playSound('slophit');
}

function updateParticles(dt){
G.particles=G.particles.filter(p=>{p.x+=p.vx*dt/16.67;p.y+=p.vy*dt/16.67;p.life-=dt/16.67;return p.life>0});
G.floatTexts=G.floatTexts.filter(f=>{f.y-=0.8*dt/16.67;f.life-=dt/16.67;return f.life>0});
}

function updateCoffeePickups(dt){
G.coffeePickups=G.coffeePickups.filter(c=>{
  c.life-=dt/16.67;
  if(c.life<=0)return false;
  for(const e of G.enemies){
    if(!e.alive)continue;
    if(dist(c,e)<15){
      // Slow all enemies for 3 seconds
      for(const e2 of G.enemies){if(e2.alive){e2.slowed=true;e2.slowTimer=180}}
      spawnFloatText(c.x,c.y-10,'COFFEE!','#8B4513');
      return false;
    }
  }
  return true;
});
}

function updateWave(dt){
if(G.betweenWaves){
  G.countdown-=dt/1000;
  if(G.countdown<=0){startWave();G.betweenWaves=false}
  return;
}
if(!G.waveActive)return;
// Spawn from queue
if(G.spawnQueue.length>0){
  G.spawnTimer-=dt;
  if(G.spawnTimer<=0){
    const e=G.spawnQueue.shift();
    G.enemies.push(e);
    if(e.isBoss)playSound('bossspawn');
    G.spawnTimer=G.currentInterval;
  }
}
// Check wave complete
if(G.spawnQueue.length===0&&G.enemies.filter(e=>e.alive).length===0){
  G.waveActive=false;
  playSound('waveclear');
  if(G.wave>=MAX_WAVE&&!G.endless){
    G.state='victory';showEndScreen(true);
  }else{
    G.betweenWaves=true;G.countdown=WAVE_DELAY;
  }
}
}

function startWave(){
G.wave++;
let waveDef,hpMult=1;
if(G.wave<=MAX_WAVE){
  waveDef=WAVES[G.wave];
}else{
  G.endlessWave=G.wave-MAX_WAVE;
  hpMult=1+G.endlessWave*0.2;
  // Generate random wave
  const types=['buzz','buzz','buzz','corp','thought','stealth','bomb'];
  const n=10+G.endlessWave*3;
  const enemies=[{t:'good',n:Math.min(3+Math.floor(G.endlessWave/2),10)}];
  if(G.endlessWave%5===0)enemies.push({t:'boss',n:1+Math.floor(G.endlessWave/5)});
  for(let i=0;i<n;i++)enemies.push({t:rnd(types),n:1});
  waveDef={enemies,interval:Math.max(300,800-G.endlessWave*20)};
}
G.spawnQueue=buildSpawnQueue(waveDef,hpMult);
G.spawnTimer=0;
G.currentInterval=waveDef.interval;
G.waveActive=true;
playSound('wavestart');
}

function skipToNextWave(){
if(G.betweenWaves){
  G.gold+=15;G.stats.goldEarned+=15;
  spawnFloatText(CW/2,CH/2,'+15 BONUS!','#e3b341');
  G.betweenWaves=false;
  startWave();
}
}

// ==================== RENDERING ====================
function render(){
ctx.clearRect(0,0,CW,CH);
// Background
ctx.fillStyle='#0d1117';ctx.fillRect(0,0,CW,CH);
// Path
drawPath();
// Grid overlay when placing
if(G.selectedType)drawGrid();
// Coffee pickups
for(const c of G.coffeePickups){
  ctx.fillStyle='#8B451380';ctx.beginPath();ctx.arc(c.x,c.y,c.radius,0,Math.PI*2);ctx.fill();
  ctx.font='12px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText('\u2615',c.x,c.y+4);
}
// Towers
for(const t of G.towers)drawTower(t);
// Range indicator for selected/hovered tower
if(G.selectedTower&&G.state==='playing'){
  ctx.strokeStyle='#1f6feb40';ctx.lineWidth=1;ctx.beginPath();
  ctx.arc(G.selectedTower.x,G.selectedTower.y,G.selectedTower.range,0,Math.PI*2);ctx.stroke();
}
// Placement preview
if(G.selectedType&&G.mouseGX>=0){
  const def=TOWER_DEFS[G.selectedType];
  const valid=isValidPlacement(G.mouseGX,G.mouseGY)&&!G.towers.some(t=>t.gx===G.mouseGX&&t.gy===G.mouseGY)&&G.gold>=def.cost;
  const c=cellCenter(G.mouseGX,G.mouseGY);
  ctx.strokeStyle=valid?'#238636':'#f85149';ctx.lineWidth=2;
  ctx.strokeRect(G.mouseGX*CS,G.mouseGY*CS,CS,CS);
  if(valid){
    ctx.strokeStyle='#23863640';ctx.lineWidth=1;ctx.beginPath();
    ctx.arc(c.x,c.y,def.range,0,Math.PI*2);ctx.stroke();
  }
}
// Enemies (sorted by progress for layering)
const sortedEnemies=[...G.enemies].filter(e=>e.alive).sort((a,b)=>getPathProgress(a)-getPathProgress(b));
for(const e of sortedEnemies)drawEnemy(e);
// Projectiles
for(const p of G.projectiles)if(p.alive)drawProjectile(p);
// Particles
for(const p of G.particles){
  const a=p.life/p.maxLife;
  ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.radius*a,0,Math.PI*2);ctx.fill();
}
ctx.globalAlpha=1;
// Float texts
for(const f of G.floatTexts){
  const a=f.life/f.maxLife;
  ctx.globalAlpha=a;ctx.fillStyle=f.color;ctx.font='bold 12px sans-serif';ctx.textAlign='center';
  ctx.fillText(f.text,f.x,f.y);
}
ctx.globalAlpha=1;
// Castle
drawCastle();
// AI source
drawSource();
// Hot take flash
if(G.hotTakeFlash>0){
  ctx.globalAlpha=G.hotTakeFlash/20;ctx.fillStyle='#f0883e';ctx.fillRect(0,0,CW,CH);
  ctx.globalAlpha=1;G.hotTakeFlash-=1;
}
}

function drawPath(){
ctx.lineWidth=CS;ctx.strokeStyle='#21262d';ctx.lineCap='round';ctx.lineJoin='round';
ctx.beginPath();ctx.moveTo(WAYPOINTS[0].x,WAYPOINTS[0].y);
for(let i=1;i<WAYPOINTS.length;i++)ctx.lineTo(WAYPOINTS[i].x,WAYPOINTS[i].y);
ctx.stroke();
// Border
ctx.lineWidth=CS+4;ctx.strokeStyle='#30363d20';
ctx.beginPath();ctx.moveTo(WAYPOINTS[0].x,WAYPOINTS[0].y);
for(let i=1;i<WAYPOINTS.length;i++)ctx.lineTo(WAYPOINTS[i].x,WAYPOINTS[i].y);
ctx.stroke();
// Re-draw main path on top
ctx.lineWidth=CS-2;ctx.strokeStyle='#21262d';
ctx.beginPath();ctx.moveTo(WAYPOINTS[0].x,WAYPOINTS[0].y);
for(let i=1;i<WAYPOINTS.length;i++)ctx.lineTo(WAYPOINTS[i].x,WAYPOINTS[i].y);
ctx.stroke();
}

function drawGrid(){
ctx.strokeStyle='#30363d30';ctx.lineWidth=0.5;
for(let x=0;x<=CW;x+=CS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke()}
for(let y=0;y<=CH;y+=CS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke()}
// Highlight valid cells
for(let gx=0;gx<COLS;gx++)for(let gy=0;gy<ROWS;gy++){
  if(isValidPlacement(gx,gy)&&!G.towers.some(t=>t.gx===gx&&t.gy===gy)){
    ctx.fillStyle='#238636'+(G.gold>=TOWER_DEFS[G.selectedType].cost?'18':'08');
    ctx.fillRect(gx*CS,gy*CS,CS,CS);
  }
}
}

function drawTower(t){
const def=TOWER_DEFS[t.type];
// Base square
ctx.fillStyle=t.disabled?'#484f58':'#161b22';
ctx.fillRect(t.x-CS/2+2,t.y-CS/2+2,CS-4,CS-4);
ctx.strokeStyle=t.disabled?'#484f58':'#30363d';ctx.lineWidth=1;
ctx.strokeRect(t.x-CS/2+2,t.y-CS/2+2,CS-4,CS-4);
// Emoji
ctx.font=t.disabled?'16px sans-serif':'20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
if(t.disabled){ctx.globalAlpha=0.4}
ctx.fillText(def.emoji,t.x,t.y);
if(t.disabled){ctx.globalAlpha=1}
// Level indicator
if(t.level>1){
  ctx.fillStyle='#e3b341';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText('\u2605',t.x+12,t.y-12);
}
// Coffee steam
if(t.type==='coffee'&&!t.disabled){
  const time=Date.now()/300;
  for(let i=0;i<3;i++){
    const ox=Math.sin(time+i*2)*4;
    const oy=-8-i*6-Math.sin(time*1.5+i)*3;
    ctx.globalAlpha=0.3-i*0.08;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(t.x+ox,t.y+oy,2,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Range circle
  ctx.strokeStyle='#8B451320';ctx.lineWidth=1;ctx.beginPath();
  ctx.arc(t.x,t.y,t.range,0,Math.PI*2);ctx.stroke();
}
}

function drawEnemy(e){
// Stealth: hidden unless revealed
if(e.isStealth&&!e.revealed){
  // Draw faintly for player hint
  ctx.globalAlpha=0.15;
}
// Circle
ctx.beginPath();ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
if(e.isBomb){
  const pulse=Math.sin((e.pulsePhase||0))*0.3+0.7;
  ctx.fillStyle=e.color;ctx.globalAlpha=(ctx.globalAlpha||1)*pulse;
}else{
  ctx.fillStyle=e.color;
}
ctx.fill();
// Good word glow
if(e.isGood){
  ctx.strokeStyle='#3fb950';ctx.lineWidth=2;ctx.stroke();
  ctx.shadowColor='#56d4dd';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);ctx.stroke();
  ctx.shadowBlur=0;
}
// HP bar (not for good words)
if(!e.isGood&&e.hp<e.maxHP){
  const barW=e.radius*2,barH=3;
  const bx=e.x-barW/2,by=e.y-e.radius-6;
  ctx.fillStyle='#21262d';ctx.fillRect(bx,by,barW,barH);
  const pct=e.hp/e.maxHP;
  ctx.fillStyle=pct>0.5?'#3fb950':pct>0.25?'#d29922':'#f85149';
  ctx.fillRect(bx,by,barW*pct,barH);
}
// Word text
ctx.fillStyle=e.isGood?'#0d1117':'#fff';
ctx.font=(e.isBoss?'bold 8':'7')+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
const displayWord=e.word.length>12?e.word.substring(0,11)+'..':e.word;
ctx.fillText(displayWord,e.x,e.y);
ctx.globalAlpha=1;
}

function drawProjectile(p){
if(p.towerType==='trebuchet'){
  ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.isCow?'\u{1F404}':p.isUpgraded?'\u{1F525}':'\u25CF',p.x,p.y);
  return;
}
if(p.type==='woof'){
  ctx.fillStyle='#e3b341';ctx.font='bold 8px sans-serif';ctx.textAlign='center';
  ctx.fillText('WOOF',p.x,p.y);
}else if(p.type==='text'){
  ctx.fillStyle='#c9d1d9';ctx.font='7px sans-serif';ctx.textAlign='center';
  ctx.fillText(p.text,p.x,p.y);
}else if(p.type==='duck'){
  ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('\u{1F986}',p.x,p.y);
}else if(p.type==='emoji'){
  ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText(p.text,p.x,p.y);
}
}

function drawCastle(){
const cx=WAYPOINTS[WAYPOINTS.length-1].x,cy=WAYPOINTS[WAYPOINTS.length-1].y;
const hp=G.castleHP;
// Castle body
ctx.save();
if(hp<50)ctx.translate(Math.random()*(50-hp)/25,0);
if(hp<25){ctx.translate(cx,cy);ctx.rotate(Math.sin(Date.now()/500)*0.03);ctx.translate(-cx,-cy)}
// Main structure
ctx.fillStyle=hp>50?'#2d333b':hp>25?'#3d2b1b':'#4a1a1a';
ctx.fillRect(cx-22,cy-25,44,35);
// Towers
ctx.fillRect(cx-26,cy-32,12,15);
ctx.fillRect(cx+14,cy-32,12,15);
// Battlements
for(let i=0;i<5;i++)ctx.fillRect(cx-24+i*10,cy-37,6,6);
// Door
ctx.fillStyle='#161b22';
ctx.fillRect(cx-6,cy-2,12,15);
// Cracks at low HP
if(hp<50){
  ctx.strokeStyle='#0d1117';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-10,cy-15);ctx.lineTo(cx-5,cy-5);ctx.lineTo(cx-12,cy+2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+8,cy-20);ctx.lineTo(cx+12,cy-8);ctx.stroke();
}
// Fire at very low HP
if(hp<25){
  const t=Date.now()/100;
  for(let i=0;i<3;i++){
    const fx=cx-10+i*10+Math.sin(t+i)*3;
    const fy=cy-30-Math.abs(Math.sin(t*1.5+i*2))*8;
    ctx.fillStyle=i%2?'#f0883e':'#f85149';
    ctx.beginPath();ctx.arc(fx,fy,3+Math.sin(t+i)*2,0,Math.PI*2);ctx.fill();
  }
}
ctx.restore();
// Slop words on castle
ctx.font='6px sans-serif';ctx.fillStyle='#f0883e80';ctx.textAlign='center';
for(const s of G.castleSlopWords.slice(-15)){
  ctx.save();ctx.translate(cx+s.x,cy+s.y);ctx.rotate(s.rot);
  ctx.fillText(s.word,0,0);ctx.restore();
}
// HP bar
const barW=50,barH=5,bx=cx-barW/2,by=cy+18;
ctx.fillStyle='#21262d';ctx.fillRect(bx,by,barW,barH);
ctx.fillStyle=hp>50?'#3fb950':hp>25?'#d29922':'#f85149';
ctx.fillRect(bx,by,barW*(hp/100),barH);
ctx.strokeStyle='#30363d';ctx.lineWidth=0.5;ctx.strokeRect(bx,by,barW,barH);
// Label
ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';ctx.textAlign='center';
ctx.fillText('CASTLE',cx,cy+30);
}

function drawSource(){
const sx=WAYPOINTS[0].x,sy=WAYPOINTS[0].y;
const pulse=Math.sin(Date.now()/400)*0.3+0.7;
ctx.fillStyle=`rgba(240,136,62,${pulse*0.3})`;
ctx.beginPath();ctx.arc(sx,sy,18,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#f0883e';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('AI',sx,sy);
}

// ==================== UI ====================
function updateUI(){
const waveText=G.endless?`${G.wave}`:`${G.wave}/${MAX_WAVE}`;
document.getElementById('b-wave').textContent=waveText;
document.getElementById('b-gold').textContent=G.gold;
const hpEl=document.getElementById('b-health');
hpEl.textContent=Math.max(0,Math.round(G.castleHP))+'%';
hpEl.className='bar-value health'+(G.castleHP<=25?' danger':G.castleHP<=50?' warn':'');
document.getElementById('b-score').textContent=G.score;
// Timer
const timerLabel=document.getElementById('b-timer-label');
const timerVal=document.getElementById('b-timer');
if(G.betweenWaves){
  timerLabel.textContent='Next wave';timerVal.textContent=Math.ceil(G.countdown)+'s';
}else if(G.waveActive){
  timerLabel.textContent='Enemies';timerVal.textContent=G.spawnQueue.length+G.enemies.filter(e=>e.alive).length;
}else{timerLabel.textContent='';timerVal.textContent=''}
// Wave button
const btn=document.getElementById('wave-btn');
if(G.betweenWaves){btn.disabled=false;btn.textContent='NEXT WAVE (+15)';}
else if(!G.waveActive&&G.wave===0){btn.disabled=false;btn.textContent='START WAVE 1';}
else{btn.disabled=true;btn.textContent='FIGHTING...';}
// Tower buttons
document.querySelectorAll('.tower-btn').forEach(b=>{
  const type=b.dataset.type;
  const def=TOWER_DEFS[type];
  b.classList.toggle('disabled',G.gold<def.cost);
});
}

function buildSidebar(){
const sidebar=document.getElementById('sidebar');
sidebar.innerHTML='<h2>TOWERS</h2>';
for(const type of TOWER_ORDER){
  const def=TOWER_DEFS[type];
  const div=document.createElement('div');
  div.className='tower-btn';div.dataset.type=type;
  div.innerHTML=`<span class="tower-emoji">${def.emoji}</span><div class="tower-info"><div class="tower-name">${def.name}</div><div class="tower-cost">${def.cost} gold</div><div class="tower-desc">${def.desc}</div></div>`;
  div.addEventListener('click',()=>{
    if(G.state!=='playing')return;
    if(G.selectedType===type){G.selectedType=null}
    else{G.selectedType=type;G.selectedTower=null;hideUpgradeMenu()}
    document.querySelectorAll('.tower-btn').forEach(b=>b.classList.toggle('selected',b.dataset.type===G.selectedType));
  });
  sidebar.appendChild(div);
}
}

function hideUpgradeMenu(){
document.getElementById('upgrade-menu').style.display='none';
G.selectedTower=null;
}

function showUpgradeMenu(tower,screenX,screenY){
G.selectedTower=tower;G.selectedType=null;
document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
const def=TOWER_DEFS[tower.type];
const menu=document.getElementById('upgrade-menu');
document.getElementById('um-title').textContent=def.emoji+' '+(tower.level>1?def.upgrade.name:def.name);
const info=tower.level>1?'MAX LEVEL':`Kills: ${tower.kills}`;
document.getElementById('um-info').textContent=info;
const uBtn=document.getElementById('upgrade-btn');
if(tower.level>1){
  uBtn.textContent='MAX LEVEL';uBtn.disabled=true;
}else{
  const cost=def.upgrade.cost;
  uBtn.textContent=`Upgrade: ${def.upgrade.name} (${cost}g)`;
  uBtn.disabled=G.gold<cost;
  uBtn.onclick=()=>{
    if(G.gold<cost)return;
    G.gold-=cost;tower.level=2;tower.totalCost+=cost;
    if(def.upgrade.dmg)tower.dmg=def.upgrade.dmg;
    if(def.upgrade.range)tower.range=def.upgrade.range;
    if(def.upgrade.bounces)tower.bounces=def.upgrade.bounces;
    if(tower.type==='coffee'){tower.range=def.upgrade.range||130}
    playSound('upgrade');
    showUpgradeMenu(tower,screenX,screenY);
  };
}
const sellVal=Math.floor(tower.totalCost*0.5);
const sBtn=document.getElementById('sell-btn');
sBtn.textContent=`Sell (+${sellVal}g)`;
sBtn.onclick=()=>{
  G.gold+=sellVal;G.towers=G.towers.filter(t=>t!==tower);
  playSound('sell');hideUpgradeMenu();
};
// Position menu
const wrap=document.getElementById('canvas-wrap').getBoundingClientRect();
const canvasRect=canvas.getBoundingClientRect();
const scaleX=canvasRect.width/CW,scaleY=canvasRect.height/CH;
let mx=canvasRect.left+tower.x*scaleX-wrap.left+20;
let my=canvasRect.top+tower.y*scaleY-wrap.top-20;
if(mx+200>wrap.width)mx-=220;
if(my+150>wrap.height)my-=100;
menu.style.left=mx+'px';menu.style.top=my+'px';menu.style.display='block';
}

// ==================== SCREENS ====================
function showStartScreen(){
const s=document.getElementById('screen');
s.innerHTML=`<h1>SLOP DEFENSE</h1>
<p class="subtitle">Buzzwords are invading. Your castle is the last bastion of coherent thought.</p>
<div class="tower-preview">
<div><span class="emoji">\u{1F415}</span> Dog -- Barks at slop. Good boy.</div>
<div><span class="emoji">\u{1F913}</span> Well Actually Guy -- Pedantic. Effective.</div>
<div><span class="emoji">\u{1F986}</span> Rubber Duck -- Reveals hidden slop.</div>
<div><span class="emoji">\u{1F3F0}</span> Trebuchet -- Medieval. Area damage. Watch for friendly fire.</div>
<div><span class="emoji">\u2615</span> Coffee -- Makes everything faster.</div>
<div><span class="emoji">\u{1F4A9}</span> Troll -- Chaos. Pure chaos.</div>
</div>
<div class="enemy-preview">
<span>\u{1F7E0} Buzzwords</span>
<span>\u{1F7E1} Thought Leaders</span>
<span>\u{1F534} Slop Bombs</span>
<span>\u{1F535} Stealth Slop</span>
<span>\u2B1B Bosses</span>
<span style="color:#56d4dd">\u{1FA75} Real Words (let these through!)</span>
</div>
<button id="start-btn">CLICK TO DEFEND YOUR CASTLE</button>`;
document.getElementById('start-btn').addEventListener('click',()=>{
  initAudio();startGame();
});
document.getElementById('overlay').classList.remove('hidden');
}

function showEndScreen(victory){
const s=document.getElementById('screen');
if(victory){
  const hp=Math.round(G.castleHP);
  const grade=hp>=90?'S':hp>=75?'A':hp>=60?'B':hp>=40?'C':hp>=20?'D':'F';
  const gradeColor={S:'#3fb950',A:'#56d4dd',B:'#1f6feb',C:'#d29922',D:'#f0883e',F:'#f85149'}[grade];
  let favTower='none';let maxK=0;
  for(const[t,k]of Object.entries(G.stats.towerKills))if(k>maxK){maxK=k;favTower=TOWER_DEFS[t]?.emoji+' '+TOWER_DEFS[t]?.name}
  s.innerHTML=`<h1 style="color:#3fb950">YOUR CASTLE STANDS</h1>
  <div class="grade" style="color:${gradeColor}">${grade}</div>
  <div class="stats-grid">
  <span class="label">Castle health</span><span class="val">${hp}%</span>
  <span class="label">Slop destroyed</span><span class="val">${G.stats.killed}</span>
  <span class="label">Good words saved</span><span class="val">${G.stats.goodSaved}</span>
  <span class="label">Good words lost</span><span class="val">${G.stats.goodLost}</span>
  <span class="label">Gold earned</span><span class="val">${G.stats.goldEarned}</span>
  <span class="label">Favorite tower</span><span class="val">${favTower}</span>
  </div>
  <button id="restart-btn">DEFEND AGAIN</button>
  <button id="endless-btn">ENDLESS MODE</button>`;
  if(G.score>G.highScores.campaign){G.highScores.campaign=G.score;localStorage.setItem('slopDefenseHS',JSON.stringify(G.highScores))}
}else{
  s.innerHTML=`<h1 style="color:#f85149">YOUR CASTLE HAS FALLEN</h1>
  <p class="subtitle">It now exclusively publishes listicles about disrupting the synergy paradigm.</p>
  <div class="stats-grid">
  <span class="label">Survived to wave</span><span class="val">${G.wave}</span>
  <span class="label">Slop destroyed</span><span class="val">${G.stats.killed}</span>
  <span class="label">Score</span><span class="val">${G.score}</span>
  </div>
  <button id="restart-btn">TRY AGAIN</button>`;
  const key=G.endless?'endless':'campaign';
  if(G.score>G.highScores[key]){G.highScores[key]=G.score;localStorage.setItem('slopDefenseHS',JSON.stringify(G.highScores))}
}
document.getElementById('overlay').classList.remove('hidden');
document.getElementById('restart-btn').addEventListener('click',()=>{startGame()});
if(document.getElementById('endless-btn'))
  document.getElementById('endless-btn').addEventListener('click',()=>{startGame(true)});
}

function startGame(endless){
G.state='playing';G.wave=0;G.gold=100;G.score=0;G.castleHP=100;
G.towers=[];G.enemies=[];G.projectiles=[];G.particles=[];G.floatTexts=[];G.coffeePickups=[];
G.selectedType=null;G.selectedTower=null;G.castleSlopWords=[];
G.waveActive=false;G.betweenWaves=true;G.countdown=3;G.spawnQueue=[];
G.endless=!!endless;G.endlessWave=0;G.hotTakeFlash=0;
G.stats={killed:0,goodSaved:0,goodLost:0,goldEarned:0,towerKills:{}};
document.getElementById('overlay').classList.add('hidden');
hideUpgradeMenu();
}

// ==================== INPUT ====================
canvas.addEventListener('mousemove',e=>{
const rect=canvas.getBoundingClientRect();
const scaleX=CW/rect.width,scaleY=CH/rect.height;
G.mouseX=(e.clientX-rect.left)*scaleX;
G.mouseY=(e.clientY-rect.top)*scaleY;
G.mouseGX=Math.floor(G.mouseX/CS);
G.mouseGY=Math.floor(G.mouseY/CS);
});

canvas.addEventListener('click',e=>{
if(G.state!=='playing')return;
initAudio();
const rect=canvas.getBoundingClientRect();
const scaleX=CW/rect.width,scaleY=CH/rect.height;
const mx=(e.clientX-rect.left)*scaleX,my=(e.clientY-rect.top)*scaleY;
const gx=Math.floor(mx/CS),gy=Math.floor(my/CS);

if(G.selectedType){
  const def=TOWER_DEFS[G.selectedType];
  if(G.gold>=def.cost&&isValidPlacement(gx,gy)&&!G.towers.some(t=>t.gx===gx&&t.gy===gy)){
    G.gold-=def.cost;
    G.towers.push(placeTower(G.selectedType,gx,gy));
    playSound('place');
  }
  return;
}
// Check if clicking a tower
hideUpgradeMenu();
for(const t of G.towers){
  if(t.gx===gx&&t.gy===gy){
    showUpgradeMenu(t,e.clientX,e.clientY);return;
  }
}
});

canvas.addEventListener('contextmenu',e=>{
e.preventDefault();
if(G.state!=='playing')return;
const rect=canvas.getBoundingClientRect();
const scaleX=CW/rect.width,scaleY=CH/rect.height;
const mx=(e.clientX-rect.left)*scaleX,my=(e.clientY-rect.top)*scaleY;
const gx=Math.floor(mx/CS),gy=Math.floor(my/CS);
for(const t of G.towers){
  if(t.gx===gx&&t.gy===gy){showUpgradeMenu(t,e.clientX,e.clientY);return}
}
hideUpgradeMenu();
});

document.addEventListener('keydown',e=>{
if(e.key==='Escape'){G.selectedType=null;hideUpgradeMenu();
  document.querySelectorAll('.tower-btn').forEach(b=>b.classList.remove('selected'));
}
});

document.getElementById('wave-btn').addEventListener('click',()=>{
if(G.state!=='playing')return;
initAudio();
if(!G.waveActive&&G.wave===0){G.betweenWaves=false;startWave();return}
if(G.betweenWaves)skipToNextWave();
});

document.getElementById('mute-btn').addEventListener('click',()=>{
soundOn=!soundOn;
document.getElementById('mute-btn').textContent='Sound: '+(soundOn?'ON':'OFF');
});

// Click outside canvas to deselect
document.addEventListener('click',e=>{
if(!canvas.contains(e.target)&&!document.getElementById('upgrade-menu').contains(e.target)&&
   !document.getElementById('sidebar').contains(e.target)){
  hideUpgradeMenu();
}
});

// ==================== GAME LOOP ====================
function gameLoop(timestamp){
if(!G.lastTime)G.lastTime=timestamp;
const dt=Math.min(timestamp-G.lastTime,50);
G.lastTime=timestamp;

if(G.state==='playing'){
  updateWave(dt);
  updateTowers(dt);
  updateEnemies(dt);
  updateProjectiles(dt);
  updateParticles(dt);
  updateCoffeePickups(dt);
  // Clean up dead enemies (but only outside active spawning)
  G.enemies=G.enemies.filter(e=>e.alive);
  G.projectiles=G.projectiles.filter(p=>p.alive);
  // Check game over
  if(G.castleHP<=0){G.castleHP=0;G.state='gameover';showEndScreen(false)}
  render();
  updateUI();
}else if(G.state==='menu'){
  render();
}
requestAnimationFrame(gameLoop);
}

// ==================== INIT ====================
buildSidebar();
showStartScreen();
requestAnimationFrame(gameLoop);
</script>
