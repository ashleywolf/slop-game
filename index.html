<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOP - The AI Blog Writing Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0612;
  color: #e0e0e0;
  font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}
#game-container {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* ===== START SCREEN ===== */
#start-screen {
  position: absolute;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0a0612;
}
#start-screen h1 {
  font-size: clamp(60px, 12vw, 140px);
  font-weight: 900;
  letter-spacing: 0.3em;
  background: linear-gradient(135deg, #a855f7, #ec4899, #06b6d4, #f97316);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  animation: titlePulse 2s ease-in-out infinite;
}
@keyframes titlePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}
#start-screen .subtitle {
  font-size: clamp(14px, 2vw, 20px);
  color: #888;
  margin-bottom: 6px;
}
#start-screen .tagline {
  font-size: clamp(11px, 1.5vw, 15px);
  color: #666;
  font-style: italic;
  margin-bottom: 40px;
}
.lane-legend {
  display: flex;
  gap: 20px;
  margin-bottom: 40px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 20px;
}
.lane-legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: clamp(11px, 1.3vw, 14px);
}
.key-badge {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 16px;
  color: #fff;
}
.lane-legend-item:nth-child(1) .key-badge { background: #a855f7; }
.lane-legend-item:nth-child(2) .key-badge { background: #ec4899; }
.lane-legend-item:nth-child(3) .key-badge { background: #06b6d4; }
.lane-legend-item:nth-child(4) .key-badge { background: #f97316; }
.start-prompt {
  font-size: clamp(14px, 2vw, 18px);
  color: #a855f7;
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ===== GAMEOVER ===== */
#gameover-screen {
  position: absolute;
  inset: 0;
  z-index: 100;
  display: none;
  flex-direction: column;
  align-items: center;
  background: #0a0612;
  overflow-y: auto;
  padding: 30px 20px;
}
#gameover-screen h2 {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 900;
  margin-bottom: 10px;
  color: #a855f7;
}
.go-grade {
  font-size: clamp(48px, 8vw, 80px);
  font-weight: 900;
  margin-bottom: 4px;
}
.go-grade-label {
  font-size: clamp(12px, 1.6vw, 16px);
  color: #888;
  margin-bottom: 20px;
  text-align: center;
}
.go-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
  max-width: 600px;
  width: 100%;
  margin-bottom: 20px;
}
.go-stat {
  background: #1a1025;
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}
.go-stat .val { font-size: 22px; font-weight: 900; }
.go-stat .lbl { font-size: 10px; color: #888; margin-top: 2px; }
.go-blog {
  max-width: 600px;
  width: 100%;
  background: #faf9f7;
  color: #222;
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 20px;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 14px;
  line-height: 1.7;
}
.go-blog .medium-hdr { text-align: center; color: #888; font-size: 11px; margin-bottom: 8px; font-family: inherit; }
.go-blog .author { text-align: center; margin-bottom: 14px; font-size: 12px; color: #666; }
.go-blog .claps { text-align: center; margin-top: 14px; font-size: 13px; color: #999; }
.go-blog .c-correct { color: #222; }
.go-blog .c-wrong { color: #e11d48; text-decoration: underline wavy #e11d48; }
.go-blog .c-slop { color: #e11d48; font-weight: 700; text-decoration: underline wavy #e11d48; font-style: italic; }
.go-commentary {
  max-width: 600px;
  width: 100%;
  text-align: center;
  font-size: clamp(13px, 1.6vw, 16px);
  color: #ec4899;
  font-style: italic;
  margin-bottom: 20px;
}
.go-btn {
  background: linear-gradient(135deg, #a855f7, #ec4899);
  color: #fff;
  border: none;
  padding: 14px 40px;
  border-radius: 8px;
  font-size: 18px;
  font-weight: 900;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
  transition: transform 0.1s;
}
.go-btn:hover { transform: scale(1.05); }
.go-btn:active { transform: scale(0.97); }
.go-hs { font-size: 12px; color: #666; margin-bottom: 30px; }

/* ===== GAMEPLAY ===== */
#gameplay {
  display: none;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
}
#top-area {
  height: 120px;
  min-height: 90px;
  padding: 8px 16px;
  display: flex;
  gap: 12px;
  background: #0a0612;
  border-bottom: 1px solid #1a1025;
  z-index: 10;
  position: relative;
}
#blog-area { flex: 1; overflow: hidden; }
#target-sentence {
  font-size: 12px;
  color: #444;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#blog-output {
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
  overflow: hidden;
  max-height: 72px;
}
#blog-output .c { color: #06b6d4; }
#blog-output .w { color: #e11d48; }
#blog-output .sl { color: #f97316; font-weight: 700; text-decoration: underline wavy #f97316; }
#blog-output .cur {
  display: inline-block; width: 2px; height: 14px;
  background: #06b6d4; margin-left: 1px;
  animation: blink 0.6s ease-in-out infinite;
  vertical-align: text-bottom;
}
#hud-area {
  width: 170px;
  min-width: 150px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
#hud-score {
  font-size: clamp(20px, 3vw, 30px);
  font-weight: 900;
  background: linear-gradient(135deg, #a855f7, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
#hud-combo { font-size: 15px; font-weight: 700; color: #f97316; min-height: 20px; transition: transform 0.1s; }
#hud-timer { font-size: 14px; color: #888; }
#hud-accuracy { font-size: 12px; color: #666; }
#hud-counts { font-size: 11px; color: #555; text-align: right; }

/* Lane area */
#lane-area { flex: 1; position: relative; display: flex; overflow: hidden; }
#lane-canvas { display: block; }
#slap-sidebar {
  width: 130px;
  min-width: 110px;
  background: #0d0818;
  border-left: 1px solid #1a1025;
  padding: 10px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  overflow: hidden;
}
#slap-label { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: #a855f7; }
#slap-face { font-size: 34px; transition: transform 0.2s; }
#slap-meter-wrap { width: 100%; height: 10px; background: #1a1025; border-radius: 5px; overflow: hidden; }
#slap-meter { height: 100%; width: 0%; background: linear-gradient(90deg, #22c55e, #eab308, #e11d48); border-radius: 5px; transition: width 0.3s; }
#slap-notes { font-size: 10px; color: #e11d48; text-align: center; min-height: 40px; overflow: hidden; }

/* Overlays */
#commentary {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(13px, 1.8vw, 17px);
  color: #ec4899;
  font-style: italic;
  text-align: center;
  pointer-events: none;
  z-index: 20;
  opacity: 0;
  transition: opacity 0.3s;
  max-width: 500px;
  text-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
}
#flash-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 15;
  opacity: 0;
  transition: opacity 0.15s;
}
.hit-fb {
  position: absolute;
  font-weight: 900;
  font-size: 15px;
  pointer-events: none;
  z-index: 20;
  animation: floatUp 0.7s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-40px) scale(0.8); }
}
.notify {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-weight: 900;
  pointer-events: none;
  z-index: 25;
  opacity: 0;
}
#speed-notify { font-size: 28px; color: #f97316; text-shadow: 0 0 30px rgba(249, 115, 22, 0.6); }
#next-notify { font-size: 22px; color: #06b6d4; text-shadow: 0 0 30px rgba(6, 182, 212, 0.6); top: 40%; }

#lane-keys {
  position: absolute;
  bottom: 6px;
  left: 0;
  display: flex;
  z-index: 12;
  pointer-events: none;
}
.lk {
  text-align: center;
  font-size: 20px;
  font-weight: 900;
  opacity: 0.25;
  transition: opacity 0.08s, transform 0.08s;
}
.lk.on { opacity: 1; transform: scale(1.2); }
.lk-0 { color: #a855f7; }
.lk-1 { color: #ec4899; }
.lk-2 { color: #06b6d4; }
.lk-3 { color: #f97316; }
</style>
</head>
<body>
<div id="game-container">

  <div id="start-screen">
    <h1>SLOP</h1>
    <div class="subtitle">The AI Blog Writing Simulator</div>
    <div class="tagline">Guitar Hero, but you're writing the worst blog post ever.</div>
    <div class="lane-legend">
      <div class="lane-legend-item"><div class="key-badge">S</div> Left keys (QWERTASDFGZXCV)</div>
      <div class="lane-legend-item"><div class="key-badge">L</div> Right keys (YUIHJKBNM)</div>
      <div class="lane-legend-item"><div class="key-badge">O</div> Space &amp; punctuation</div>
      <div class="lane-legend-item"><div class="key-badge">P</div> DODGE THE SLOP</div>
    </div>
    <div class="start-prompt">Press any key to start</div>
  </div>

  <div id="gameover-screen">
    <h2>GAME OVER</h2>
    <div class="go-grade" id="go-grade"></div>
    <div class="go-grade-label" id="go-grade-label"></div>
    <div class="go-stats" id="go-stats"></div>
    <div class="go-commentary" id="go-commentary"></div>
    <div class="go-blog" id="go-blog"></div>
    <button class="go-btn" id="go-btn">SLOP AGAIN</button>
    <div class="go-hs" id="go-hs"></div>
  </div>

  <div id="gameplay">
    <div id="top-area">
      <div id="blog-area">
        <div id="target-sentence"></div>
        <div id="blog-output"></div>
      </div>
      <div id="hud-area">
        <div id="hud-score">0</div>
        <div id="hud-combo"></div>
        <div id="hud-timer">60.0s</div>
        <div id="hud-accuracy">100%</div>
        <div id="hud-counts"></div>
      </div>
    </div>
    <div id="lane-area">
      <canvas id="lane-canvas"></canvas>
      <div id="slap-sidebar">
        <div id="slap-label">S.L.A.P.</div>
        <div id="slap-face">&#x1F610;</div>
        <div id="slap-meter-wrap"><div id="slap-meter"></div></div>
        <div id="slap-notes"></div>
      </div>
      <div id="lane-keys"></div>
    </div>
    <div id="commentary"></div>
    <div id="flash-overlay"></div>
    <div id="speed-notify" class="notify">SPEED UP!</div>
    <div id="next-notify" class="notify">NEXT SENTENCE</div>
  </div>

</div>

<script>
(function() {
"use strict";

// ---- DATA ----
var SENTENCES = [
  "open source is good and we should fund it more",
  "hello world this is my first blog post please clap",
  "i am definitely a human writing this and not a robot",
  "the code works on my machine and that is good enough",
  "git push force to main on friday what could go wrong",
  "i deleted the production database but it was an accident",
  "my pull request has been open for three months please review",
  "the meeting could have been an email but here we are"
];

var SLOP_WORDS = [
  "SYNERGY","LEVERAGE","PARADIGM","DISRUPT","HOLISTIC","AGILE","BANDWIDTH",
  "SCALABLE","DEEP DIVE","CIRCLE BACK","IDEATE","UNPACK","PIPELINE",
  "PIVOT","NORTH STAR","STAKEHOLDER","ALIGNMENT","GRANULAR",
  "MOVE THE NEEDLE","THOUGHT LEADER","LOW-HANGING FRUIT","GAME CHANGER","VALUE ADD"
];

var SLAP_NOTES = [
  "Margin note: 'no.'",
  "Margin note: 'DELETE THIS'",
  "Margin note: 'were you held at gunpoint?'",
  "Margin note: 'this triggers my fight or flight'",
  "Margin note: 'I'm calling HR'",
  "Margin note: 'peer review: rejected with prejudice'",
  "Margin note: 'detected: crimes against prose'",
  "Margin note: 'flagged by the Geneva Convention'"
];

var S_SET = {}; "qwertasdfgzxcv".split("").forEach(function(c){S_SET[c]=1;});
var L_SET = {}; "yuihjkbnml".split("").forEach(function(c){L_SET[c]=1;});
var O_SET = {}; [" ",".",",","'","!","?"].forEach(function(c){O_SET[c]=1;});

var COLORS = ["#a855f7","#ec4899","#06b6d4","#f97316"];
var COLORS_DIM = ["rgba(168,85,247,0.12)","rgba(236,72,153,0.12)","rgba(6,182,212,0.12)","rgba(249,115,22,0.12)"];

var GAME_SECS = 60;
var HIT_Y_RATIO = 0.87;
var PERFECT_PX = 26;
var GOOD_PX = 52;

function lane(ch) {
  var c = ch.toLowerCase();
  if (S_SET[c]) return 0;
  if (L_SET[c]) return 1;
  if (O_SET[c]) return 2;
  return 0;
}
function dispCh(ch) {
  if (ch === " ") return "___";
  if (ch === "." || ch === "," || ch === "'") return " "+ch+" ";
  return ch.toUpperCase();
}
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ---- AUDIO ----
var audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function beep(type,f1,dur,f2,vol) {
  if (!audioCtx) return;
  var o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.setValueAtTime(f1, audioCtx.currentTime);
  if (f2) o.frequency.linearRampToValueAtTime(f2, audioCtx.currentTime+dur);
  g.gain.setValueAtTime(vol||0.14, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
function sndPerfect()  { beep("sine",880,0.12,null,0.18); }
function sndGood()     { beep("sine",660,0.10,null,0.12); }
function sndMiss()     { beep("triangle",160,0.15,null,0.12); }
function sndSlopHit()  { beep("sawtooth",220,0.35,80,0.15); }
function sndSlopDodge(){ beep("sine",440,0.25,880,0.14); }
function sndChord() {
  beep("sine",523,0.2,null,0.09);
  setTimeout(function(){beep("sine",659,0.2,null,0.09);},40);
  setTimeout(function(){beep("sine",784,0.2,null,0.09);},80);
}

// ---- DOM ----
var $start = document.getElementById("start-screen");
var $over = document.getElementById("gameover-screen");
var $play = document.getElementById("gameplay");
var $canvas = document.getElementById("lane-canvas");
var $target = document.getElementById("target-sentence");
var $blog = document.getElementById("blog-output");
var $score = document.getElementById("hud-score");
var $combo = document.getElementById("hud-combo");
var $timer = document.getElementById("hud-timer");
var $acc = document.getElementById("hud-accuracy");
var $counts = document.getElementById("hud-counts");
var $comment = document.getElementById("commentary");
var $flash = document.getElementById("flash-overlay");
var $speedN = document.getElementById("speed-notify");
var $nextN = document.getElementById("next-notify");
var $slapFace = document.getElementById("slap-face");
var $slapMeter = document.getElementById("slap-meter");
var $slapNotes = document.getElementById("slap-notes");
var $laneKeys = document.getElementById("lane-keys");
var $laneArea = document.getElementById("lane-area");
var $slapSidebar = document.getElementById("slap-sidebar");

var ctx, cW, cH, hitY, lW;
var keyEls = [];

function buildKeys() {
  $laneKeys.innerHTML = "";
  var names = ["S","L","O","P"];
  for (var i=0;i<4;i++) {
    var d = document.createElement("div");
    d.className = "lk lk-"+i;
    d.textContent = names[i];
    d.style.width = lW+"px";
    $laneKeys.appendChild(d);
    keyEls[i] = d;
  }
}

function resize() {
  var sw = $slapSidebar.offsetWidth;
  var w = $laneArea.clientWidth - sw;
  var h = $laneArea.clientHeight;
  var dpr = window.devicePixelRatio || 1;
  $canvas.width = w * dpr;
  $canvas.height = h * dpr;
  $canvas.style.width = w + "px";
  $canvas.style.height = h + "px";
  cW = w; cH = h;
  hitY = cH * HIT_Y_RATIO;
  lW = cW / 4;
  ctx = $canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  $laneKeys.style.width = w + "px";
  buildKeys();
}

// ---- STATE ----
var mode = "start"; // start | play | over
var notes, blogC, score2, combo2, maxC, perfC, goodC, missC, slopHC, slopDC, totalH;
var timeL, speed, lastSU, sIdx, cIdx, nxtNote, nxtSlop, slopM;
var commentT, commentF, missStr, perfStr;
var raf, prevT;

function start() {
  initAudio(); mode = "play";
  notes=[]; blogC=[]; score2=0; combo2=0; maxC=0;
  perfC=0; goodC=0; missC=0; slopHC=0; slopDC=0; totalH=0;
  timeL=GAME_SECS; speed=140; lastSU=0;
  sIdx=Math.floor(Math.random()*SENTENCES.length); cIdx=0;
  nxtNote=0; nxtSlop=8+Math.random()*4; slopM=0;
  commentT=0; commentF={}; missStr=0; perfStr=0;

  $start.style.display="none"; $over.style.display="none";
  $play.style.display="flex";
  resize(); updTarget(); updBlog(); updHUD(); updSLAP();
  prevT = performance.now();
  raf = requestAnimationFrame(loop);
}

// ---- LOOP ----
function loop(now) {
  var dt = Math.min((now - prevT)/1000, 0.05);
  prevT = now;
  timeL -= dt;
  if (timeL <= 0) { timeL=0; end(); return; }

  // speed up every 15s
  var sl = Math.floor((GAME_SECS - timeL)/15);
  if (sl > lastSU) { lastSU = sl; speed = 140 + sl*45; showNotify($speedN); }

  // spawn letters
  nxtNote -= dt;
  if (nxtNote <= 0) {
    var sen = SENTENCES[sIdx];
    if (cIdx >= sen.length) {
      sIdx = (sIdx+1) % SENTENCES.length;
      cIdx = 0;
      updTarget();
      showNotify($nextN);
    }
    var ch = sen[cIdx];
    notes.push({ch:ch, disp:dispCh(ch), lane:lane(ch), y:-30, hit:false, miss:false, slop:false, hType:null, hTime:0, a:1});
    cIdx++;
    nxtNote = Math.max(0.18, 0.45 - (speed-140)*0.002);
  }

  // spawn slop
  nxtSlop -= dt;
  if (nxtSlop <= 0) {
    var sw = SLOP_WORDS[Math.floor(Math.random()*SLOP_WORDS.length)];
    notes.push({ch:null, disp:sw, lane:3, y:-40, hit:false, miss:false, slop:true, slopW:sw, hType:null, hTime:0, a:1});
    nxtSlop = 8 + Math.random()*4;
  }

  // move notes
  for (var i=0;i<notes.length;i++) {
    var n = notes[i];
    n.y += (n.slop ? speed*0.85 : speed) * dt;
    if (!n.hit && !n.miss && n.y > hitY + GOOD_PX + 12) {
      n.miss = true;
      if (n.slop) doSlopDodge(n);
      else doMiss(n);
    }
  }
  notes = notes.filter(function(n){ return n.y < cH+60; });

  // commentary timer
  if (commentT > 0) { commentT -= dt; if (commentT<=0) $comment.style.opacity="0"; }

  render(); updHUD();
  raf = requestAnimationFrame(loop);
}

// ---- INPUT ----
document.addEventListener("keydown", function(e) {
  if (mode === "start") { start(); return; }
  if (mode === "over") { if (e.key==="Enter"||e.key===" ") start(); return; }
  if (mode !== "play") return;

  var k = e.key.toLowerCase(), ln = -1;
  if (k==="s") ln=0; else if (k==="l") ln=1; else if (k==="o") ln=2; else if (k==="p") ln=3;
  if (ln < 0) return;
  e.preventDefault();

  // key visual
  if (keyEls[ln]) { keyEls[ln].classList.add("on"); setTimeout(function(){keyEls[ln].classList.remove("on");},100); }

  // find closest note in lane
  var best=null, bDist=Infinity;
  for (var i=0;i<notes.length;i++) {
    var n=notes[i];
    if (n.hit||n.miss||n.lane!==ln) continue;
    var d=Math.abs(n.y - hitY);
    if (d < bDist && d < GOOD_PX+20) { bDist=d; best=n; }
  }
  if (!best) return;

  best.hit = true;
  best.hTime = performance.now();

  if (best.slop) {
    doSlopHit(best);
  } else {
    if (Math.abs(best.y - hitY) <= PERFECT_PX) {
      best.hType = "perfect"; doPerfect(best);
    } else {
      best.hType = "good"; doGood(best);
    }
  }
});

document.addEventListener("keyup", function(e) {
  var k=e.key.toLowerCase(),ln=-1;
  if(k==="s")ln=0;else if(k==="l")ln=1;else if(k==="o")ln=2;else if(k==="p")ln=3;
  if(ln>=0&&keyEls[ln]) keyEls[ln].classList.remove("on");
});

// prevent space scroll
document.addEventListener("keydown", function(e){ if(e.key===" " && mode==="play") e.preventDefault(); });

// ---- HIT / MISS ----
function mult() {
  if (combo2>=80) return 8;
  if (combo2>=40) return 4;
  if (combo2>=20) return 3;
  if (combo2>=10) return 2;
  return 1;
}
function doPerfect(n) {
  score2 += 100*mult(); combo2++; perfC++; totalH++; perfStr++; missStr=0;
  if(combo2>maxC) maxC=combo2;
  blogC.push({ch:n.ch,t:"c"}); updBlog(); sndPerfect();
  feedback(n,"PERFECT","#fbbf24"); flash("rgba(251,191,36,0.08)");
  chkComment(); if(combo2>0&&combo2%10===0) sndChord();
}
function doGood(n) {
  score2 += 50*mult(); combo2++; goodC++; totalH++; perfStr=0; missStr=0;
  if(combo2>maxC) maxC=combo2;
  blogC.push({ch:n.ch,t:"c"}); updBlog(); sndGood();
  feedback(n,"GOOD","#a3e635"); chkComment();
  if(combo2>0&&combo2%10===0) sndChord();
}
function doMiss(n) {
  score2 -= 10; combo2=0; missC++; totalH++; perfStr=0; missStr++;
  var wc = "xzqjvkw";
  blogC.push({ch:wc[Math.floor(Math.random()*wc.length)],t:"w"});
  updBlog(); sndMiss(); feedback(n,"MISS","#e11d48"); chkComment();
}
function doSlopHit(n) {
  score2 -= 200; combo2=0; slopHC++; totalH++; missStr=0; perfStr=0;
  slopM = Math.min(100, slopM+25);
  blogC.push({ch:" "+n.slopW+" ",t:"s"}); updBlog(); updSLAP(); sndSlopHit();
  feedback(n,"SLOP!","#e11d48"); flash("rgba(225,29,72,0.15)");
  addSlapNote(SLAP_NOTES[Math.floor(Math.random()*SLAP_NOTES.length)]);
  chkComment();
}
function doSlopDodge(n) {
  score2 += 200*mult(); slopDC++; sndSlopDodge();
  feedback(n,"DODGED!","#22c55e"); flash("rgba(34,197,94,0.08)");
  fireCom("slopDodge","Smart. That word has a restraining order from real writing.");
}

// ---- FEEDBACK ----
function feedback(n, txt, col) {
  var el = document.createElement("div");
  el.className = "hit-fb"; el.textContent = txt; el.style.color = col;
  var x = (n.lane+0.5)*lW;
  el.style.left = x+"px"; el.style.top = (hitY-20)+"px";
  $laneArea.appendChild(el);
  setTimeout(function(){el.remove();},700);
}
function flash(c) {
  $flash.style.background=c; $flash.style.opacity="1";
  setTimeout(function(){$flash.style.opacity="0";},150);
}
function showNotify(el) {
  el.style.transition="none"; el.style.opacity="1";
  setTimeout(function(){el.style.transition="opacity 0.5s";el.style.opacity="0";},800);
}

// ---- COMMENTARY ----
function fireCom(k,t) {
  if (commentF[k]) return;
  commentF[k]=true;
  $comment.textContent = '"'+t+'"';
  $comment.style.opacity="1";
  commentT=4;
}
function chkComment() {
  if(perfC===1) fireCom("fp","Wait. That's a word. Everyone stay calm.");
  if(combo2===10) fireCom("c10","You're too good at this. Suspicious.");
  if(combo2===20) fireCom("c20","Are you using autocomplete? That's cheating. (It's also our whole thing.)");
  if(missC===1) fireCom("fm","There it is. The human condition.");
  if(slopHC===1) fireCom("fs","SLOP DETECTED. That word has been forwarded to the Hague.");
  if(slopHC>=3) fireCom("ms","Your post has been accepted as a keynote.");
  if(missStr>=5) fireCom("mstr","Your keyboard is filing a complaint.");
  if(perfStr>=15) fireCom("pstr","This is dangerously close to a point.");
}

// ---- SLAP ----
function updSLAP() {
  $slapMeter.style.width = slopM+"%";
  if (slopM>=75){ $slapFace.textContent="\uD83E\uDD2F"; $slapFace.style.transform="scale(1.3)"; }
  else if(slopM>=50){ $slapFace.textContent="\uD83D\uDE24"; $slapFace.style.transform="scale(1.1)"; }
  else if(slopM>=25){ $slapFace.textContent="\uD83D\uDE12"; $slapFace.style.transform="scale(1)"; }
  else { $slapFace.textContent="\uD83D\uDE10"; $slapFace.style.transform="scale(1)"; }
}
function addSlapNote(t) {
  var d=document.createElement("div"); d.textContent=t; d.style.marginTop="4px";
  d.style.animation="floatUp 4s ease-out forwards";
  $slapNotes.prepend(d);
  while($slapNotes.children.length>4) $slapNotes.removeChild($slapNotes.lastChild);
}

// ---- DOM UPDATES ----
function updTarget() { $target.textContent = "TARGET: " + SENTENCES[sIdx]; }
function updBlog() {
  var h="";
  for (var i=0;i<blogC.length;i++) {
    var b=blogC[i], e=esc(b.ch);
    if(b.t==="c") h+='<span class="c">'+e+'</span>';
    else if(b.t==="w") h+='<span class="w">'+e+'</span>';
    else h+='<span class="sl">'+e+'</span>';
  }
  h+='<span class="cur"></span>';
  $blog.innerHTML=h;
}
function updHUD() {
  $score.textContent = score2.toLocaleString();
  if(combo2>=2) {
    var m=mult();
    $combo.textContent = combo2+"x combo"+(m>1?" (x"+m+")":"");
    $combo.style.transform = "scale("+Math.min(1.5,1+combo2*0.005)+")";
    $combo.style.color = combo2>=20?"#fbbf24":"#f97316";
  } else { $combo.textContent=""; $combo.style.transform="scale(1)"; }
  $timer.textContent = timeL.toFixed(1)+"s";
  $timer.style.color = timeL<10?"#e11d48":"#888";
  var ac = totalH>0?Math.round((perfC+goodC)/totalH*100):100;
  $acc.textContent = ac+"% accuracy";
  $counts.innerHTML = '<span style="color:#fbbf24">'+perfC+'P</span> <span style="color:#a3e635">'+goodC+'G</span> <span style="color:#e11d48">'+missC+'M</span>';
}

// ---- CANVAS RENDER ----
function render() {
  ctx.clearRect(0,0,cW,cH);
  var now = performance.now();

  // scrolling grid
  var go = (now*0.05*(speed/140))%40;
  ctx.strokeStyle="rgba(255,255,255,0.03)"; ctx.lineWidth=1;
  for(var y=go;y<cH;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cW,y);ctx.stroke(); }

  // lane dividers
  ctx.strokeStyle="rgba(255,255,255,0.06)";
  for(var i=1;i<4;i++){ ctx.beginPath();ctx.moveTo(i*lW,0);ctx.lineTo(i*lW,cH);ctx.stroke(); }

  // lane glow near hit zone
  for(var i=0;i<4;i++){
    var g=ctx.createLinearGradient(0,hitY-80,0,hitY+20);
    g.addColorStop(0,"transparent"); g.addColorStop(0.5,COLORS_DIM[i]); g.addColorStop(1,"transparent");
    ctx.fillStyle=g; ctx.fillRect(i*lW,hitY-80,lW,100);
  }

  // hit zone
  ctx.fillStyle="rgba(255,255,255,0.07)"; ctx.fillRect(0,hitY-3,cW,6);
  ctx.fillStyle="rgba(251,191,36,0.1)"; ctx.fillRect(0,hitY-PERFECT_PX,cW,PERFECT_PX*2);

  // notes
  for(var i=0;i<notes.length;i++){
    var n=notes[i];
    if(n.hit){
      var el=(now-n.hTime)/300;
      n.a=Math.max(0,1-el);
      if(n.a<=0) continue;
    }
    var cx=(n.lane+0.5)*lW, cy=n.y;
    var dh=Math.abs(cy-hitY), prox=Math.max(0,1-dh/cH);
    var sc=1+prox*0.15+Math.sin(now*0.006)*0.03;

    ctx.save();
    ctx.globalAlpha=n.a;
    ctx.translate(cx,cy);
    ctx.scale(sc,sc);

    if(n.slop){
      // slop bomb
      var sp=1+Math.sin(now*0.01)*0.1;
      ctx.scale(sp,sp);
      ctx.shadowColor="#e11d48";
      ctx.shadowBlur=20+Math.sin(now*0.008)*10;
      var bw=lW*0.82, bh=36;
      var gr=ctx.createLinearGradient(-bw/2,-bh/2,bw/2,bh/2);
      gr.addColorStop(0,"#f97316"); gr.addColorStop(1,"#e11d48");
      ctx.fillStyle=gr;
      rr(ctx,-bw/2,-bh/2,bw,bh,8); ctx.fill();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2;
      rr(ctx,-bw/2,-bh/2,bw,bh,8); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle="#fff";
      ctx.font="bold 11px 'SF Mono',Menlo,monospace";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("\u2620 "+n.disp,0,0);
    } else {
      // normal note
      var col=COLORS[n.lane];
      if(dh<80){ ctx.shadowColor=col; ctx.shadowBlur=15; }
      if(n.hit&&n.hType==="perfect"){ ctx.shadowColor="#fbbf24"; ctx.shadowBlur=30; }
      var nw=lW*0.6, nh=32;
      if(n.hit&&n.hType==="perfect") ctx.fillStyle="#fbbf24";
      else if(n.hit&&n.hType==="good") ctx.fillStyle="#a3e635";
      else if(n.miss) ctx.fillStyle="#e11d48";
      else ctx.fillStyle=col;
      rr(ctx,-nw/2,-nh/2,nw,nh,6); ctx.fill();
      ctx.strokeStyle="rgba(255,255,255,0.25)"; ctx.lineWidth=1;
      rr(ctx,-nw/2,-nh/2,nw,nh,6); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle="#fff";
      ctx.font="bold 15px 'SF Mono',Menlo,monospace";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(n.disp,0,1);
    }
    ctx.restore();
  }
}

function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

// ---- END GAME ----
function end() {
  mode = "over";
  cancelAnimationFrame(raf);
  $play.style.display="none";
  $over.style.display="flex";

  var ac = totalH>0?Math.round((perfC+goodC)/totalH*100):100;
  var grade,gLbl,gCol;
  if(slopHC>=5){ grade="S+"; gLbl="Congratulations. You're ready for middle management."; gCol="#e11d48"; }
  else if(ac>=95&&slopHC===0){ grade="F"; gLbl="Too coherent. Suspiciously human."; gCol="#22c55e"; }
  else if(ac>=80){ grade="D"; gLbl="Almost readable. Try harder to be worse."; gCol="#a3e635"; }
  else if(ac>=60){ grade="C"; gLbl="Getting there. The typos add character."; gCol="#eab308"; }
  else if(ac>=40){ grade="B"; gLbl="Now we're cooking with buzzwords."; gCol="#f97316"; }
  else if(ac>=20){ grade="A"; gLbl="Corporate-ready. Ship it to the blog."; gCol="#ec4899"; }
  else { grade="S"; gLbl="I showed this to ChatGPT and it apologized."; gCol="#a855f7"; }

  document.getElementById("go-grade").textContent=grade;
  document.getElementById("go-grade").style.color=gCol;
  document.getElementById("go-grade-label").textContent=gLbl;

  var stats = [
    {v:score2.toLocaleString(),l:"SCORE",c:"#a855f7"},
    {v:ac+"%",l:"ACCURACY",c:"#06b6d4"},
    {v:perfC,l:"PERFECT",c:"#fbbf24"},
    {v:goodC,l:"GOOD",c:"#a3e635"},
    {v:missC,l:"MISS",c:"#e11d48"},
    {v:maxC+"x",l:"MAX COMBO",c:"#f97316"},
    {v:slopHC,l:"SLOP HITS",c:"#e11d48"},
    {v:slopDC,l:"SLOP DODGED",c:"#22c55e"}
  ];
  document.getElementById("go-stats").innerHTML = stats.map(function(s){
    return '<div class="go-stat"><div class="val" style="color:'+s.c+'">'+s.v+'</div><div class="lbl">'+s.l+'</div></div>';
  }).join("");

  var gc="";
  if(ac>=90&&slopHC===0) gc="Wait. This almost makes sense. Are you cheating?";
  else if(ac<30) gc="Draft saved as untitled_final_FINAL2.docx";
  else if(slopHC>=4) gc="Congratulations. You're ready for middle management.";
  else if(missC>perfC) gc="Your keyboard is filing a complaint with OSHA.";
  else if(maxC>=20) gc="That combo was dangerously close to competence.";
  else gc="Another masterpiece for the content mines.";
  document.getElementById("go-commentary").textContent='"'+gc+'"';

  var bh='<div class="medium-hdr">Published on Medium &middot; 0 min read</div><div class="author">by AI Blog Bot 3000</div><p>';
  for(var i=0;i<blogC.length;i++){
    var b=blogC[i],e2=esc(b.ch);
    if(b.t==="c") bh+='<span class="c-correct">'+e2+'</span>';
    else if(b.t==="w") bh+='<span class="c-wrong">'+e2+'</span>';
    else bh+='<span class="c-slop">'+e2+'</span>';
  }
  bh+='</p>';
  var claps=Math.max(0,Math.floor(score2/100));
  bh+='<div class="claps">\uD83D\uDC4F '+claps+' clap'+(claps!==1?'s':'')+'</div>';
  document.getElementById("go-blog").innerHTML=bh;

  var hs=parseInt(localStorage.getItem("slop_rhythm_hs")||"0");
  var $hs=document.getElementById("go-hs");
  if(score2>hs){ hs=score2; localStorage.setItem("slop_rhythm_hs",hs.toString());
    $hs.textContent="NEW HIGH SCORE! "+hs.toLocaleString(); $hs.style.color="#fbbf24";
  } else { $hs.textContent="High score: "+hs.toLocaleString(); $hs.style.color="#666"; }
}

document.getElementById("go-btn").addEventListener("click", start);
window.addEventListener("resize", function(){ if(mode==="play") resize(); });
})();
</script>
